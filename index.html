<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="./src/css/main.css">
  <title>Finpay | UI Architecture & Design System</title>
</head>

<body>
  <header class="header">
    <div class="container">
      <div class="header__content">
        <img class="logo" src="./src/assets/logo.svg" alt="Finpay Logo">
        
        <nav class="navigation">
          <ul class="navigation__list">
            <li class="navigation__item"><a href="#">Products</a></li>
            <li class="navigation__item"><a href="#">Customers</a></li>
            <li class="navigation__item"><a href="#">Pricing</a></li>
            <li class="navigation__item"><a href="#">Learn</a></li>
          </ul>
        </nav>

        <div class="actions">
          <button class="button button--full" data-variant="tertiary" size="medium">Login</button>
          <button class="button button--full" data-variant="primary" size="medium">Sign Up</button>
          <button class="button mobile-menu" aria-label="Open Menu">
            <img src="./src/assets/icons/menu-mobile.svg" alt="Menu" />
          </button>
        </div>
      </div>
    </div>
  </header>

  <main>
    <section class="section section--surface">
      <div class="container">
        <div class="hero">
          <div class="hero__content">
            <div class="hero__info">
              <h1><strong>Get paid early</strong> <br> save automatically all your pay.</h1>
              <p>Supports small businesses with simple invoicing, powerful integrations, and cash flow management tools.</p>
            </div>
            
            <form class="form">
              <div class="input-container">
                <div class="input-container__group">
                  <input type="email" name="email" autocomplete="off" class="input" placeholder="Your business email">
                  <button type="submit" class="button" data-variant="primary" size="small" disabled>Sign Up</button>
                </div>
    
                <div class="input-container__message"></div>
              </div>
            </form>

            <div class="hero__clients">
              <img src="./src/assets/logo-klarna.svg" alt="Klarna" />
              <img src="./src/assets/logo-coinbase.svg" alt="Coinbase" />
              <img src="./src/assets/logo-instacart.svg" alt="Instacart" />
            </div>
          </div>
        </div>
      </div>
    </section>

    <section class="section section--gradient">
      <div class="container">
        <div class="block">
          <h2 class="text-center">Finpay | UI Architecture & Design System</h2>
        </div>
      </div>
    </section>

    <section class="section section--canvas">
      <div class="container"></div>
    </section>
  </main>

  <script src="./src/js/app.js"></script>
</body>

</html>
